version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment: [REDIS_HOST=redis]
    depends_on: [redis]
    volumes: ["./backend:/app"]
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped
  frontend:
    image: nginx:alpine
    ports: ["3000:80"]
    volumes: ["./index.html:/usr/share/nginx/html/index.html"]
